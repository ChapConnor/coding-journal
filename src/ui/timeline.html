<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{nonce}}';">
  <style>
    :root {
      --note-bg: var(--vscode-editor-inactiveSelectionBackground, rgba(255, 255, 200, 0.08));
      --commit-border: var(--vscode-gitDecoration-addedResourceForeground, #73c991);
      --idle-color: var(--vscode-descriptionForeground, #888);
      --debug-color: var(--vscode-editorWarning-foreground, #cca700);
      --separator: var(--vscode-widget-border, rgba(128,128,128,0.2));
    }

    body {
      font-family: var(--vscode-font-family, monospace);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      padding: 12px 16px;
      margin: 0;
    }

    .header {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--separator);
    }

    .header h2 {
      margin: 0 0 4px 0;
      font-size: 1.1em;
      font-weight: 600;
    }

    .header .meta {
      font-size: 0.9em;
      color: var(--idle-color);
    }

    /* View switcher */
    .view-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--separator);
      flex-wrap: wrap;
    }

    .view-bar button {
      background: transparent;
      color: var(--idle-color);
      border: 1px solid var(--separator);
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85em;
      font-family: inherit;
    }

    .view-bar button:hover {
      color: var(--vscode-foreground);
      border-color: var(--vscode-foreground);
    }

    .view-bar button.active {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border-color: var(--vscode-button-background);
    }

    .timeline {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    /* Group headers (for grouped views) */
    .group-header {
      font-weight: 600;
      font-size: 0.95em;
      margin: 12px 0 4px 0;
      padding: 4px 0;
      border-bottom: 1px solid var(--separator);
      color: var(--vscode-foreground);
    }

    .group-header:first-child {
      margin-top: 0;
    }

    .event {
      display: flex;
      gap: 10px;
      padding: 4px 8px;
      border-radius: 3px;
      margin-bottom: 2px;
      align-items: baseline;
    }

    .event .time {
      flex-shrink: 0;
      width: 42px;
      font-size: 0.85em;
      color: var(--idle-color);
      font-family: monospace;
    }

    .event .icon {
      flex-shrink: 0;
      width: 18px;
      text-align: center;
    }

    .event .body {
      flex: 1;
      min-width: 0;
    }

    .event.auto {
      opacity: 0.75;
      font-size: 0.92em;
    }

    .event.note {
      background: var(--note-bg);
      opacity: 1;
      padding: 6px 8px;
      margin: 4px 0;
      border-radius: 4px;
    }

    .event.note .body {
      font-style: italic;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .event.commit {
      border-left: 3px solid var(--commit-border);
      padding-left: 6px;
      opacity: 1;
    }

    .event.idle {
      color: var(--idle-color);
    }

    .event.debug {
      color: var(--debug-color);
    }

    .diff-stat {
      font-size: 0.85em;
      color: var(--idle-color);
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--separator);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .footer button {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      padding: 6px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.9em;
    }

    .footer button:hover {
      background: var(--vscode-button-hoverBackground);
    }

    .footer button.secondary {
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
    }

    .empty {
      text-align: center;
      color: var(--idle-color);
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2 id="title">Coding Session</h2>
    <div class="meta" id="meta"></div>
  </div>

  <div class="view-bar">
    <button class="active" data-view="chronological">Timeline</button>
    <button data-view="type">By Type</button>
    <button data-view="file">By File</button>
    <button data-view="notes-only">Notes Only</button>
  </div>

  <ul class="timeline" id="timeline">
    <li class="empty" id="empty-msg">No events yet. Start coding!</li>
  </ul>

  <div class="footer">
    <button id="btn-note" title="Add a note (Cmd+Shift+J)">+ Add Note</button>
    <button id="btn-share" class="secondary" title="Share session summary on X/Twitter">Share on X</button>
    <button id="btn-end" class="secondary">End Session</button>
  </div>

  <script nonce="{{nonce}}">
    const vscode = acquireVsCodeApi();
    const timeline = document.getElementById('timeline');
    const emptyMsg = document.getElementById('empty-msg');
    const titleEl = document.getElementById('title');
    const metaEl = document.getElementById('meta');

    let currentSession = null;
    let currentView = 'chronological';

    // View switcher
    document.querySelectorAll('.view-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-bar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        if (currentSession) fullRender(currentSession);
      });
    });

    document.getElementById('btn-note').addEventListener('click', () => {
      vscode.postMessage({ command: 'addNote' });
    });

    document.getElementById('btn-end').addEventListener('click', () => {
      vscode.postMessage({ command: 'endSession' });
    });

    document.getElementById('btn-share').addEventListener('click', () => {
      vscode.postMessage({ command: 'shareOnX' });
    });

    window.addEventListener('message', (msg) => {
      const data = msg.data;
      if (data.command === 'update') {
        currentSession = data.session;
        fullRender(data.session);
      }
    });

    function fullRender(session) {
      updateHeader(session);
      timeline.innerHTML = '';

      const events = session.events.filter(e => e.type !== 'file_switch' && e.type !== 'git_stage');

      if (events.length === 0) {
        timeline.innerHTML = '<li class="empty">No events yet. Start coding!</li>';
        return;
      }

      switch (currentView) {
        case 'chronological':
          renderChronological(events);
          break;
        case 'type':
          renderByType(events);
          break;
        case 'file':
          renderByFile(session.events);
          break;
        case 'notes-only':
          renderNotesOnly(events);
          break;
      }
    }

    function renderChronological(events) {
      for (const event of events) {
        const el = renderEvent(event);
        if (el) timeline.appendChild(el);
      }
      scrollToBottom();
    }

    function renderByType(events) {
      const typeLabels = {
        note: 'Notes',
        git_commit: 'Commits',
        edit_block: 'Edit Blocks',
        idle_start: 'Idle Periods',
        idle_end: 'Idle Periods',
        debug_start: 'Debug Sessions',
        debug_end: 'Debug Sessions',
        terminal_open: 'Terminal',
        session_start: 'Session',
        session_end: 'Session',
      };

      const groups = {};
      for (const event of events) {
        const label = typeLabels[event.type] || 'Other';
        if (!groups[label]) groups[label] = [];
        groups[label].push(event);
      }

      // Order: Notes first, then Commits, then the rest
      const order = ['Notes', 'Commits', 'Edit Blocks', 'Debug Sessions', 'Idle Periods', 'Terminal', 'Session'];
      for (const label of order) {
        if (!groups[label] || groups[label].length === 0) continue;
        const header = document.createElement('li');
        header.className = 'group-header';
        header.textContent = label + ' (' + groups[label].length + ')';
        timeline.appendChild(header);

        for (const event of groups[label]) {
          const el = renderEvent(event);
          if (el) timeline.appendChild(el);
        }
      }
    }

    function renderByFile(allEvents) {
      const editBlocks = allEvents.filter(e => e.type === 'edit_block');
      const commits = allEvents.filter(e => e.type === 'git_commit');

      if (editBlocks.length === 0 && commits.length === 0) {
        timeline.innerHTML = '<li class="empty">No file activity yet.</li>';
        return;
      }

      // Group edit blocks by file
      const fileGroups = {};
      for (const event of editBlocks) {
        const file = shortenPath(event.data.filePath || 'unknown');
        if (!fileGroups[file]) fileGroups[file] = { edits: [], totalMin: 0, totalSaves: 0 };
        fileGroups[file].edits.push(event);
        fileGroups[file].totalMin += (event.data.durationMin || 0);
        fileGroups[file].totalSaves += (event.data.saveCount || 0);
      }

      // Sort by total time spent descending
      const sorted = Object.entries(fileGroups).sort((a, b) => b[1].totalMin - a[1].totalMin);

      for (const [file, data] of sorted) {
        const header = document.createElement('li');
        header.className = 'group-header';
        header.textContent = file + ' \u2014 ' + formatMin(data.totalMin) + ' \u00B7 ' + data.totalSaves + ' save' + (data.totalSaves !== 1 ? 's' : '');
        timeline.appendChild(header);

        for (const event of data.edits) {
          const el = renderEvent(event);
          if (el) timeline.appendChild(el);
        }
      }

      // Commits at the end
      if (commits.length > 0) {
        const header = document.createElement('li');
        header.className = 'group-header';
        header.textContent = 'Commits (' + commits.length + ')';
        timeline.appendChild(header);
        for (const event of commits) {
          const el = renderEvent(event);
          if (el) timeline.appendChild(el);
        }
      }
    }

    function renderNotesOnly(events) {
      const notes = events.filter(e => e.type === 'note');
      if (notes.length === 0) {
        timeline.innerHTML = '<li class="empty">No notes yet. Press Cmd+Shift+J to add one.</li>';
        return;
      }
      for (const event of notes) {
        const el = renderEvent(event);
        if (el) timeline.appendChild(el);
      }
    }

    function updateHeader(session) {
      const start = new Date(session.startTime);
      const elapsed = formatDuration(start);
      titleEl.textContent = 'Coding Session \u2014 ' + session.workspace;

      const commits = session.events.filter(e => e.type === 'git_commit').length;
      const notes = session.events.filter(e => e.type === 'note').length;
      const branch = session.branch ? ' \u00B7 ' + session.branch : '';
      metaEl.textContent = elapsed + branch + ' \u00B7 ' + commits + ' commit' + (commits !== 1 ? 's' : '') + ' \u00B7 ' + notes + ' note' + (notes !== 1 ? 's' : '');
    }

    function renderEvent(event) {
      const time = formatTime(event.timestamp);

      let cssClass = 'auto';
      let icon = '';
      let body = '';

      switch (event.type) {
        case 'session_start':
          icon = '\u25B6';
          body = 'Session started';
          break;

        case 'session_end':
          icon = '\u23F9';
          body = 'Session ended';
          break;

        case 'edit_block': {
          icon = '\u270F\uFE0F';
          const file = shortenPath(event.data.filePath || '');
          const dur = (event.data.durationMin || 0);
          const saves = event.data.saveCount || 0;
          body = file + ' \u00B7 ' + formatMin(dur) + ' \u00B7 ' + saves + ' save' + (saves !== 1 ? 's' : '');
          break;
        }

        case 'git_commit': {
          cssClass = 'commit';
          icon = '\u2705';
          const added = event.data.linesAdded || 0;
          const removed = event.data.linesRemoved || 0;
          body = (event.data.commitMessage || '') + ' <span class="diff-stat">(+' + added + ' \u2212' + removed + ')</span>';
          break;
        }

        case 'idle_start':
          cssClass = 'idle';
          icon = '\u23F8';
          body = 'Idle';
          break;

        case 'idle_end': {
          cssClass = 'idle';
          icon = '\u23F8';
          const dur = event.data.idleDurationMin || 0;
          const label = event.data.idleType === 'long' ? 'Long idle' : 'Idle';
          body = label + ' \u00B7 ' + formatMin(dur);
          break;
        }

        case 'debug_start':
          cssClass = 'debug';
          icon = '\uD83D\uDC1E';
          body = 'Debug started (' + (event.data.debugType || 'unknown') + ')';
          break;

        case 'debug_end': {
          cssClass = 'debug';
          icon = '\uD83D\uDC1E';
          const dur = event.data.debugDurationMin || 0;
          body = 'Debug ended (' + (event.data.debugType || 'unknown') + ') \u00B7 ' + formatMin(dur);
          break;
        }

        case 'note':
          cssClass = 'note';
          icon = '\uD83D\uDCDD';
          body = '"' + escapeHtml(event.data.noteText || '') + '"';
          break;

        case 'terminal_open':
          icon = '\u276F';
          body = 'Terminal opened';
          break;

        default:
          return null;
      }

      const li = document.createElement('li');
      li.className = 'event ' + cssClass;
      li.innerHTML = '<span class="time">' + time + '</span>' +
        '<span class="icon">' + icon + '</span>' +
        '<span class="body">' + body + '</span>';
      return li;
    }

    function scrollToBottom() {
      const last = timeline.lastElementChild;
      if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function formatMin(m) {
      if (m < 1) return '<1m';
      if (m < 60) return Math.round(m) + 'm';
      const h = Math.floor(m / 60);
      const r = Math.round(m % 60);
      return r > 0 ? h + 'h ' + r + 'm' : h + 'h';
    }

    function formatDuration(start) {
      const ms = Date.now() - start.getTime();
      const min = Math.floor(ms / 60000);
      if (min < 60) return min + 'm';
      return Math.floor(min / 60) + 'h ' + (min % 60) + 'm';
    }

    function shortenPath(p) {
      const parts = p.replace(/\\/g, '/').split('/');
      if (parts.length <= 2) return p;
      return parts.slice(-2).join('/');
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }
  </script>
</body>
</html>
